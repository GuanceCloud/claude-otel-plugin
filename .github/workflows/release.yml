name: release

on:
  push:
    tags:
      - "claude-otel-plugin--v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release metadata
        id: meta
        run: |
          echo "release_version=${GITHUB_REF_NAME#claude-otel-plugin--v}" >> "$GITHUB_OUTPUT"

      - name: Check tag matches plugin version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#claude-otel-plugin--v}"
          PLUGIN_VERSION="$(python3 - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path(".claude-plugin/plugin.json").read_text())
          print(manifest["version"])
          PY
          )"
          test "${TAG_VERSION}" = "${PLUGIN_VERSION}"

      - name: Run tests
        run: python3 -m unittest discover -s test

      - name: Build release package
        run: sh scripts/package-release.sh

      - name: Prepare release installer
        run: cp scripts/install-release.sh dist/install-release.sh

      - name: Generate release notes
        run: scripts/render-release-notes.sh "${GITHUB_REF_NAME}" > dist/release-notes.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.meta.outputs.release_version }}
          body_path: dist/release-notes.md
          files: |
            dist/claude-otel-plugin.tar.gz
            dist/claude-otel-plugin.tar.gz.sha256
            dist/claude-otel-plugin-*.tar.gz
            dist/install-release.sh
